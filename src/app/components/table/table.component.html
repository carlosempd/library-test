<div class="table-container mat-elevation-z8">
  <div class="table-header" *ngIf="showFilter">
    <mat-form-field appearance="outline">
      <mat-label>{{filterPlaceholder}}</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Search something..." #input>
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="responsive-table">
    <table mat-table [dataSource]="dataSource" matSort>

      <!-- Dynamic Columns -->
      <ng-container *ngFor="let column of columns" [matColumnDef]="column.key">
        <th mat-header-cell *matHeaderCellDef mat-sort-header [disabled]="!column.sortable"> {{column.label}} </th>
        <td mat-cell *matCellDef="let row"> {{row[column.key]}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions" *ngIf="actions && actions.length > 0">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Actions">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item *ngFor="let action of actions" (click)="onAction(action.action, row)">
              <mat-icon [color]="action.color">{{action.icon}}</mat-icon>
              <span>{{action.label}}</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="100%">No data matching the filter "{{input.value}}"</td>
      </tr>
    </table>
  </div>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of items"></mat-paginator>
</div>
