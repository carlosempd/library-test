<div class="modal-container">
  <div class="modal-header">
    <h2 mat-dialog-title>{{ isEditMode ? 'Edit Author' : 'New Author' }}</h2>
    <button mat-icon-button (click)="onCancel()" type="button" class="close-btn">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="authorForm" (ngSubmit)="onSave()" class="modal-content">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter author name" />
      <mat-error *ngIf="authorForm.get('name')?.hasError('required')">
        Name is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Genre</mat-label>
      <input matInput formControlName="genre" placeholder="Enter author genre" />
      <mat-error *ngIf="authorForm.get('genre')?.hasError('required')">
        Genre is required
      </mat-error>
    </mat-form-field>

    <div class="modal-actions">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="authorForm.invalid"
      >
        Ok
      </button>
    </div>
  </form>
</div>
