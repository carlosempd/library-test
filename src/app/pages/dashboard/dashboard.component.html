<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Dashboard Overview</h1>
    <p>Insights into your library collection</p>
  </header>

  <div class="dashboard-grid">
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Books per Year Published</mat-card-title>
        <mat-card-subtitle
          >Quantity of published books by year</mat-card-subtitle
        >
      </mat-card-header>
      <mat-card-content>
        <div echarts [options]="chartOptions" class="chart-container"></div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
